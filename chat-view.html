<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE-CHAT - Чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #001B44, #003B73);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(0, 191, 255, 0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info .name {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-info .status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 4px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(0, 191, 255, 0.3);
            border-radius: 2px;
        }

        .message-date {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            padding: 16px 0 8px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.incoming {
            background: rgba(255, 255, 255, 0.06);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.outgoing {
            background: linear-gradient(135deg, rgba(0, 191, 255, 0.15), rgba(0, 229, 255, 0.15));
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message .text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message .text .emoji {
            font-size: 20px;
        }

        .message .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 4px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .message .time .status {
            font-size: 12px;
        }

        .message .time .status.sent { color: rgba(255, 255, 255, 0.2); }
        .message .time .status.delivered { color: rgba(0, 191, 255, 0.4); }
        .message .time .status.read { color: #4ade80; }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: rgba(0, 191, 255, 0.5);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .message-input-area {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .message-input-wrapper:focus-within {
            border-color: rgba(0, 191, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        .message-input-wrapper input {
            flex: 1;
            padding: 12px 4px 12px 16px;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            min-height: 48px;
        }

        .message-input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-actions {
            display: flex;
            gap: 4px;
            padding-right: 4px;
        }

        .input-actions .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 18px;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: linear-gradient(135deg, #00BFFF, #00E5FF);
            border-radius: 12px;
            color: #001B44;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.3);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .voice-recording {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .voice-recording.active {
            display: flex;
            animation: pulse-recording 1s ease-in-out infinite;
        }

        @keyframes pulse-recording {
            0%, 100% { border-color: rgba(255, 0, 0, 0.2); }
            50% { border-color: rgba(255, 0, 0, 0.6); }
        }

        .voice-recording .waveform {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 30px;
        }

        .voice-recording .waveform .bar {
            width: 3px;
            background: #ff6b6b;
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 25px; }
        }

        .voice-recording .time {
            font-size: 14px;
            color: #ff6b6b;
            font-weight: 600;
        }

        .voice-recording .cancel-recording {
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
        }

        .voice-recording .cancel-recording:hover {
            color: white;
        }

        @media (max-width: 480px) {
            .chat-header {
                padding: 12px 16px;
            }

            .messages {
                padding: 16px;
            }

            .message-input-area {
                padding: 12px 16px;
            }

            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="chat-header-left">
            <div class="avatar">
                <img src="https://i.pravatar.cc/150?img=1" alt="Chat avatar" id="chatAvatar">
            </div>
            <div class="chat-info">
                <div class="name" id="chatName">Alex Johnson</div>
                <div class="status">
                    <span class="status-dot"></span>
                    <span id="chatStatus">Online</span>
                </div>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="location.href='main.html'">✕</button>
        </div>
    </div>

    <div class="messages" id="messages">
        <div class="message-date">Today</div>
        <div class="message incoming">
            <div class="text">Hey! How are you doing?</div>
            <div class="time">12:45 PM</div>
        </div>
        <div class="message outgoing">
            <div class="text">I'm doing great! Thanks for asking 😊</div>
            <div class="time">
                12:46 PM
                <span class="status read">✓✓</span>
            </div>
        </div>
        <div class="message incoming">
            <div class="text">Would you like to grab coffee later?</div>
            <div class="time">12:47 PM</div>
        </div>
    </div>

    <div class="message-input-area">
        <div class="message-input-wrapper">
            <input type="text" placeholder="Введите сообщение..." id="messageInput" onkeydown="handleKeyPress(event)">
            <div class="input-actions">
                <button class="icon-btn" onclick="toggleEmoji()">😊</button>
                <button class="icon-btn" onclick="attachFile()">📎</button>
                <button class="icon-btn" onclick="toggleRecording()">🎤</button>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>

        <div class="voice-recording" id="voiceRecording">
            <div class="waveform">
                <div class="bar" style="animation-delay: 0s;"></div>
                <div class="bar" style="animation-delay: 0.1s;"></div>
                <div class="bar" style="animation-delay: 0.2s;"></div>
                <div class="bar" style="animation-delay: 0.3s;"></div>
                <div class="bar" style="animation-delay: 0.4s;"></div>
                <div class="bar" style="animation-delay: 0.5s;"></div>
                <div class="bar" style="animation-delay: 0.6s;"></div>
            </div>
            <span class="time" id="recordingTime">0:00</span>
            <span class="cancel-recording" onclick="cancelRecording()">✕</span>
        </div>
    </div>

    <script>
        let messages = [
            { text: 'Hey! How are you doing?', type: 'incoming', time: '12:45 PM' },
            { text: "I'm doing great! Thanks for asking 😊", type: 'outgoing', time: '12:46 PM' },
            { text: 'Would you like to grab coffee later?', type: 'incoming', time: '12:47 PM' },
        ];

        let isRecording = false;
        let recordingTimer = null;
        let seconds = 0;

        function renderMessages() {
            const container = document.getElementById('messages');
            let html = '<div class="message-date">Today</div>';
            
            messages.forEach(msg => {
                const status = msg.type === 'outgoing' ? 
                    '<span class="status read">✓✓</span>' : '';
                html += `
                    <div class="message ${msg.type}">
                        <div class="text">${msg.text}</div>
                        <div class="time">
                            ${msg.time}
                            ${status}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const newMessage = {
                text: text,
                type: 'outgoing',
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            messages.push(newMessage);
            input.value = '';
            renderMessages();

            // Simulate reply
            setTimeout(() => {
                const replies = [
                    "That's great! 😊",
                    "I agree with you!",
                    "Thanks for sharing!",
                    "Let's do it!",
                    "Sounds interesting!"
                ];
                const reply = {
                    text: replies[Math.floor(Math.random() * replies.length)],
                    type: 'incoming',
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                messages.push(reply);
                renderMessages();
            }, 1500);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function toggleEmoji() {
            const input = document.getElementById('messageInput');
            const emojis = ['😊', '😂', '❤️', '👍', '🔥', '✨', '🎉', '💯', '🤔', '👋', '🌟', '💪', '🎯', '⭐'];
            const currentEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            input.value += currentEmoji;
            input.focus();
        }

        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,.pdf,.doc,.docx,.txt';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const message = {
                        text: `📎 ${file.name}`,
                        type: 'outgoing',
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };
                    messages.push(message);
                    renderMessages();
                }
            };
            input.click();
        }

        function toggleRecording() {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        }

        function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Ваш браузер не поддерживает запись голоса');
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    isRecording = true;
                    document.getElementById('voiceRecording').classList.add('active');
                    seconds = 0;
                    updateRecordingTime();
                    
                    recordingTimer = setInterval(() => {
                        seconds++;
                        updateRecordingTime();
                    }, 1000);

                    // Store stream for stop
                    window._recordingStream = stream;
                })
                .catch(function(err) {
                    alert('Нет доступа к микрофону');
                });
        }

        function stopRecording() {
            if (window._recordingStream) {
                window._recordingStream.getTracks().forEach(track => track.stop());
                window._recordingStream = null;
            }
            
            isRecording = false;
            document.getElementById('voiceRecording').classList.remove('active');
            clearInterval(recordingTimer);
            
            if (seconds > 1) {
                const message = {
                    text: '🎤 Voice message (' + formatTime(seconds) + ')',
                    type: 'outgoing',
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                messages.push(message);
                renderMessages();
            }
        }

        function cancelRecording() {
            if (window._recordingStream) {
                window._recordingStream.getTracks().forEach(track => track.stop());
                window._recordingStream = null;
            }
            
            isRecording = false;
            document.getElementById('voiceRecording').classList.remove('active');
            clearInterval(recordingTimer);
        }

        function updateRecordingTime() {
            document.getElementById('recordingTime').textContent = formatTime(seconds);
        }

        function formatTime(sec) {
            const mins = Math.floor(sec / 60);
            const remainingSecs = sec % 60;
            return `${mins}:${remainingSecs.toString().padStart(2, '0')}`;
        }

        // Load data from URL params
        function loadChatData() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');
            const avatar = params.get('avatar');
            
            if (name) {
                document.getElementById('chatName').textContent = name;
            }
            if (avatar) {
                document.getElementById('chatAvatar').src = avatar;
            }
        }

        loadChatData();
        renderMessages();

        // Auto-focus input
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
