<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DE-CHAT - Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #001B44, #003B73);
            color: white;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(0, 191, 255, 0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info .name {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-info .status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 4px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(0, 191, 255, 0.3);
            border-radius: 2px;
        }

        .message-date {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            padding: 16px 0 8px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message.incoming {
            background: rgba(255, 255, 255, 0.06);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.outgoing {
            background: linear-gradient(135deg, rgba(0, 191, 255, 0.15), rgba(0, 229, 255, 0.15));
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message .text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message .text .emoji {
            font-size: 20px;
        }

        .message .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 4px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .message .time .status {
            font-size: 12px;
        }

        .message .time .status.sent { color: rgba(255, 255, 255, 0.2); }
        .message .time .status.delivered { color: rgba(0, 191, 255, 0.4); }
        .message .time .status.read { color: #4ade80; }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: rgba(0, 191, 255, 0.5);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .message-input-area {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .message-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .message-input-wrapper:focus-within {
            border-color: rgba(0, 191, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        .message-input-wrapper input {
            flex: 1;
            padding: 12px 4px 12px 16px;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
            min-height: 48px;
        }

        .message-input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-actions {
            display: flex;
            gap: 4px;
            padding-right: 4px;
        }

        .input-actions .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 18px;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: linear-gradient(135deg, #00BFFF, #00E5FF);
            border-radius: 12px;
            color: #001B44;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.3);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .voice-recording {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .voice-recording.active {
            display: flex;
            animation: pulse-recording 1s ease-in-out infinite;
        }

        @keyframes pulse-recording {
            0%, 100% { border-color: rgba(255, 0, 0, 0.2); }
            50% { border-color: rgba(255, 0, 0, 0.6); }
        }

        .voice-recording .waveform {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 30px;
        }

        .voice-recording .waveform .bar {
            width: 3px;
            background: #ff6b6b;
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 25px; }
        }

        .voice-recording .time {
            font-size: 14px;
            color: #ff6b6b;
            font-weight: 600;
        }

        .voice-recording .cancel-recording {
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
        }

        .voice-recording .cancel-recording:hover {
            color: white;
        }

        @media (max-width: 480px) {
            .chat-header {
                padding: 12px 16px;
            }

            .messages {
                padding: 16px;
            }

            .message-input-area {
                padding: 12px 16px;
            }

            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="userAvatar">
                        <img src="https://i.pravatar.cc/150?img=11" alt="Avatar">
                    </div>
                    <div class="user-info">
                        <h3 id="userName">John Doe</h3>
                        <span class="username">
                            <span class="status-dot"></span>
                            <span id="userStatus">Online</span>
                        </span>
                    </div>
                    <div class="header-actions">
                        <button class="icon-btn" onclick="logout()" title="Выйти">🚪</button>
                        <button class="icon-btn" onclick="location.href='profile.html'" title="Профиль">⚙️</button>
                    </div>
                </div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Поиск чатов..." id="searchInput" oninput="filterChats(this.value)">
                </div>
            </div>

            <div class="chat-list" id="chatList">
                <!-- Chats will be rendered here -->
            </div>

            <div class="sidebar-footer">
                <button class="new-chat-btn" onclick="createNewChat()">
                    ✨ Новый чат
                </button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button class="back-btn" onclick="closeChat()">←</button>
                    <div class="avatar">
                        <img src="https://i.pravatar.cc/150?img=1" alt="Chat avatar" id="chatAvatar">
                    </div>
                    <div>
                        <div class="name" id="chatName">Alex Johnson</div>
                        <div class="status">
                            <span class="status-dot"></span>
                            <span id="chatStatus">Online</span>
                        </div>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="icon-btn">📞</button>
                    <button class="icon-btn">📹</button>
                    <button class="icon-btn">⋮</button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="empty-state" id="emptyState">
                    <div class="icon">💬</div>
                    <h3>Выберите чат</h3>
                    <p>Начните общение с другом</p>
                </div>
            </div>

            <div class="message-input-area" id="messageInputArea" style="display: none;">
                <div class="message-input-wrapper">
                    <button class="icon-btn" onclick="toggleEmoji()">😊</button>
                    <input type="text" placeholder="Введите сообщение..." id="messageInput" onkeydown="handleKeyPress(event)">
                    <div class="input-actions">
                        <button class="icon-btn" onclick="attachFile()">📎</button>
                        <button class="icon-btn" onclick="startRecording()">🎤</button>
                        <button class="send-btn" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ ДАННЫЕ ============
        let chats = [
            {
                id: 1,
                name: 'Alex Johnson',
                avatar: 'https://i.pravatar.cc/150?img=1',
                online: true,
                lastMessage: 'Hey, how are you?',
                lastMessageTime: '12:45 PM',
                unread: 2,
                messages: [
                    { text: 'Hey! How are you doing?', type: 'incoming', time: '12:45 PM' },
                    { text: 'I\'m doing great! Thanks for asking 😊', type: 'outgoing', time: '12:46 PM' },
                    { text: 'Would you like to grab coffee later?', type: 'incoming', time: '12:47 PM' },
                ]
            },
            {
                id: 2,
                name: 'Sarah Wilson',
                avatar: 'https://i.pravatar.cc/150?img=2',
                online: false,
                lastMessage: 'Let\'s schedule a meeting',
                lastMessageTime: '11:20 AM',
                unread: 0,
                messages: [
                    { text: 'Hi! Are you free for a meeting?', type: 'incoming', time: '11:15 AM' },
                    { text: 'Sure, what time works for you?', type: 'outgoing', time: '11:18 AM' },
                    { text: 'Let\'s schedule a meeting', type: 'incoming', time: '11:20 AM' },
                ]
            },
            {
                id: 3,
                name: 'Team Chat',
                avatar: 'https://i.pravatar.cc/150?img=3',
                online: true,
                lastMessage: 'Sarah: Thanks for the update!',
                lastMessageTime: 'Yesterday',
                unread: 1,
                messages: [
                    { text: 'Hello team!', type: 'incoming', time: 'Yesterday' },
                    { text: 'Great work everyone!', type: 'incoming', time: 'Yesterday' },
                    { text: 'Sarah: Thanks for the update!', type: 'incoming', time: 'Yesterday' },
                ]
            }
        ];

        let currentChatId = null;
        let isTyping = false;

        // ============ ЗАГРУЗКА ПОЛЬЗОВАТЕЛЯ ============
        function loadUserData() {
            const userData = JSON.parse(localStorage.getItem('dechat_user'));
            if (userData) {
                document.getElementById('userName').textContent = userData.username || 'John Doe';
                if (userData.avatar) {
                    document.querySelector('#userAvatar img').src = userData.avatar;
                }
            }
        }

        // ============ ОТРИСОВКА ЧАТОВ ============
        function renderChats(filter = '') {
            const chatList = document.getElementById('chatList');
            const filteredChats = chats.filter(chat => 
                chat.name.toLowerCase().includes(filter.toLowerCase())
            );

            chatList.innerHTML = filteredChats.map(chat => `
                <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" onclick="openChat(${chat.id})">
                    <div class="avatar">
                        <img src="${chat.avatar}" alt="${chat.name}">
                        ${chat.online ? '<div class="online-indicator"></div>' : ''}
                    </div>
                    <div class="chat-info">
                        <div class="name">${chat.name}</div>
                        <div class="last-message">${chat.lastMessage}</div>
                    </div>
                    <div class="chat-meta">
                        <div class="time">${chat.lastMessageTime}</div>
                        ${chat.unread > 0 ? `<div class="unread">${chat.unread}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // ============ ОТКРЫТЬ ЧАТ ============
        function openChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;

            // Update UI
            document.getElementById('chatName').textContent = chat.name;
            document.getElementById('chatAvatar').src = chat.avatar;
            document.getElementById('chatStatus').textContent = chat.online ? 'Online' : 'Offline';
            document.getElementById('messageInputArea').style.display = 'flex';
            document.getElementById('emptyState').style.display = 'none';

            // Mark as read
            chat.unread = 0;

            // Render messages for THIS chat only
            renderMessages(chat.messages);

            // Mobile view
            if (window.innerWidth <= 768) {
                document.getElementById('chatArea').classList.add('active');
            }

            renderChats();
        }

        // ============ ОТРИСОВКА СООБЩЕНИЙ ============
        function renderMessages(messages) {
            const container = document.getElementById('messages');
            let html = '<div class="message-date">Today</div>';
            
            messages.forEach(msg => {
                html += `
                    <div class="message ${msg.type}">
                        <div class="text">${msg.text}</div>
                        <div class="time">${msg.time}</div>
                    </div>
                `;
            });

            if (isTyping) {
                html += `
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
            }

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // ============ ОТПРАВКА СООБЩЕНИЯ ============
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            // Находим ТЕКУЩИЙ чат по ID
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            const newMessage = {
                text: text,
                type: 'outgoing',
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            // Добавляем сообщение ТОЛЬКО в этот чат
            chat.messages.push(newMessage);
            chat.lastMessage = text;
            chat.lastMessageTime = newMessage.time;

            input.value = '';
            
            // Отрисовываем сообщения ТОЛЬКО этого чата
            renderMessages(chat.messages);

            // Симулируем ответ
            isTyping = true;
            renderMessages(chat.messages);

            setTimeout(() => {
                isTyping = false;
                const replies = [
                    "That's great! 😊",
                    "I agree with you!",
                    "Thanks for sharing!",
                    "Let's do it!",
                    "Sounds interesting!",
                    "Awesome! 👏",
                    "Perfect timing!",
                    "I'll think about it"
                ];
                const reply = {
                    text: replies[Math.floor(Math.random() * replies.length)],
                    type: 'incoming',
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                chat.messages.push(reply);
                chat.lastMessage = reply.text;
                chat.lastMessageTime = reply.time;
                renderMessages(chat.messages);
                renderChats(); // Обновляем список чатов
            }, 1500);

            renderChats(); // Обновляем список чатов
        }

        // ============ ОСТАЛЬНЫЕ ФУНКЦИИ ============
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function filterChats(query) {
            renderChats(query);
        }

        function createNewChat() {
            const name = prompt('Введите имя контакта:');
            if (name) {
                const newChat = {
                    id: Date.now(),
                    name: name,
                    avatar: 'https://i.pravatar.cc/150?img=' + Math.floor(Math.random() * 70),
                    online: true,
                    lastMessage: 'Напишите первое сообщение!',
                    lastMessageTime: 'Just now',
                    unread: 0,
                    messages: [] // У каждого чата СВОЙ массив сообщений
                };
                chats.unshift(newChat);
                renderChats();
                openChat(newChat.id);
            }
        }

        function closeChat() {
            document.getElementById('chatArea').classList.remove('active');
        }

        function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                localStorage.removeItem('dechat_user');
                window.location.href = 'reglog.html';
            }
        }

        function attachFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*,.pdf,.doc,.docx';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const chat = chats.find(c => c.id === currentChatId);
                    if (chat) {
                        const message = {
                            text: `📎 ${file.name}`,
                            type: 'outgoing',
                            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        };
                        chat.messages.push(message);
                        chat.lastMessage = message.text;
                        chat.lastMessageTime = message.time;
                        renderMessages(chat.messages);
                        renderChats();
                    }
                }
            };
            input.click();
        }

        function startRecording() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(function(stream) {
                        const btn = document.querySelector('.icon-btn:last-child');
                        btn.style.background = 'rgba(255, 0, 0, 0.3)';
                        btn.textContent = '⏹';
                        
                        setTimeout(() => {
                            btn.style.background = '';
                            btn.textContent = '🎤';
                            stream.getTracks().forEach(track => track.stop());
                            
                            const chat = chats.find(c => c.id === currentChatId);
                            if (chat) {
                                const message = {
                                    text: '🎤 Voice message',
                                    type: 'outgoing',
                                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                                };
                                chat.messages.push(message);
                                chat.lastMessage = message.text;
                                chat.lastMessageTime = message.time;
                                renderMessages(chat.messages);
                                renderChats();
                            }
                        }, 3000);
                    })
                    .catch(function(err) {
                        alert('Нет доступа к микрофону');
                    });
            } else {
                alert('Ваш браузер не поддерживает запись голоса');
            }
        }

        function toggleEmoji() {
            const input = document.getElementById('messageInput');
            const emojis = ['😊', '😂', '❤️', '👍', '🔥', '✨', '🎉', '💯', '🤔', '👋'];
            const currentEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            input.value += currentEmoji;
            input.focus();
        }

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        loadUserData();
        renderChats();

        // Автоматически открываем первый чат
        if (chats.length > 0) {
            openChat(chats[0].id);
        }
    </script>
</body>
</html>
